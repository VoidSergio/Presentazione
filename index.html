<!doctype html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rilievo Contract</title>
  <meta property="og:title" content="Rilievo Contract — Design & fornitura contract, Cagliari">
  <meta property="og:description" content="Il tuo spazio merita di durare quanto il tuo nome. Un brand Sudlegno, tre generazioni sul legno.">
  <meta property="og:image" content="public/images/og_image_agenzie.png">
  <meta property="og:type" content="website">

  <!-- 1. Consent Mode v2: default "denied" per tutto, PRIMA di qualunque
       script Google. ad_* restano denied per sempre: il banner Silktide
       gestisce solo la categoria analytics (niente Ads/remarketing). -->
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('consent', 'default', {
      analytics_storage: 'denied',
      ad_storage: 'denied',
      ad_user_data: 'denied',
      ad_personalization: 'denied',
      wait_for_update: 500
    });
  </script>

  <!-- 2. GA4: sempre caricato (Consent Mode "advanced": con consenso negato
       manda solo ping anonimi senza cookie). -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5GDZR18LN8"></script>
  <script>
    gtag('js', new Date());
    gtag('config', 'G-5GDZR18LN8');
  </script>

  <!-- 3. Silktide Consent Manager: banner di consenso, aggiorna
       analytics_storage via gtag quando l'utente sceglie. -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" id="silktide-consent-manager-css" href="https://cdn.jsdelivr.net/gh/silktide/consent-manager@v2.0.1/silktide-consent-manager.css" integrity="sha384-EdMq+R+YOnsbelo08wPenoTlnxbAyxI11NMIxzugx/qAsbh64KcOkqxYqq6pfvO/" crossorigin="anonymous">
  <style id="silktide-consent-manager-overrides">
    #stcm-wrapper {
      --boxShadow: -5px 5px 10px 0px #00000012, 0px 0px 50px 0px #0000001a;
      --fontFamily: Helvetica Neue, Segoe UI, Arial, sans-serif;
      --primaryColor: #b8954e;
      --backgroundColor: #FFFFFF;
      --textColor: #1c1c1a;
      --backdropBackgroundColor: #00000033;
      --backdropBackgroundBlur: 0px;
      --iconColor: #b8954e;
      --iconBackgroundColor: #FFFFFF;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/gh/silktide/consent-manager@v2.0.1/silktide-consent-manager.js" integrity="sha384-5Pt34uiIbCsvfiiZXoLi4HRf/YBXjr9c8e+gYeVo9smUaInNHYVtc8NZ8wUnXJIq" crossorigin="anonymous"></script>
  <script>
    window.silktideConsentManager.init({
      backdrop: { show: true },
      icon: { position: "bottomLeft" },
      prompt: { position: "bottomRight" },
      consentTypes: [
        {
          id: "essential",
          label: "Essenziali",
          description: "<p>Cookie necessari al funzionamento del sito, non disattivabili.</p>",
          required: true
        },
        {
          id: "analytics",
          label: "Analytics",
          description: "<p>Ci aiutano a capire come i visitatori navigano il sito, per migliorarlo.</p>",
          defaultValue: false,
          gtag: "analytics_storage"
        }
      ],
      text: {
        prompt: {
          description: "<p>Usiamo cookie per analizzare il traffico e migliorare l'esperienza sul sito.</p>",
          acceptAllButtonText: "Accetta tutti",
          rejectNonEssentialButtonText: "Rifiuta non essenziali",
          preferencesButtonText: "Preferenze"
        },
        preferences: {
          title: "Personalizza le preferenze sui cookie",
          description: "<p>Rispettiamo il tuo diritto alla privacy. Puoi scegliere quali categorie di cookie consentire.</p>",
          saveButtonText: "Salva e chiudi"
        }
      }
    });
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">
</head>
